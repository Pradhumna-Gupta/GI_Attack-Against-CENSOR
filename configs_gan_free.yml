# =====================================================================
# CENSOR DYNAMIC PERFORMANCE PROFILE: BATCH SIZE 1 EVALUATION
# =====================================================================
Introduction : 'GAN-free methods for gradient inversion attack.'
optim : 'GAN_free'        
cost_fn : 'sim_cmpr0'     
set_seed : 1234           
indices : 'def'           
weights : 'equal'         
init : 'randn'            
model : 'ResNet18'        
restarts : 4

# --- STRICT BATCH SIZE 1 BOUNDARY ---
batch_size: 1             # Forces single-image processing chunks
num_images : 1           
num_exp : 10              
target_id : 0             

# --- DATA ENVIRONMENT CONFIGURATIONS ---
generative_model : ''
gen_dataset : ''          
dataset: 'CIFAR100'        
data_path: './data' 
exp_name: 'imagenet_bs1_maturation_study' 
output_dir: './results_gan_free/'       

geiping : true
yin : false
train_epochs: 10          # Evaluates over 10 active progression epochs

# --- ORIGINAL REPO CENSOR DEFENSE TUNING ---
our_num_tries : 30        # Locked to original repo baseline trials
defense_method : 'orthogonal'  
defense_setting : 
      noise : 0.01
      clipping : None
      compression : None
      representation : None
      orthogonal : 0.005  # Calibrated search elasticity for rapid convergence

ckpt: None
lr_same_pace: false